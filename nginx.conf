server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Always revalidate with the server before using a cached copy,
    # so deploys show up immediately instead of waiting out old
    # browser/mobile cache. nginx still returns a cheap 304 when the
    # file hasn't changed, so this doesn't hurt performance.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
